<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capability Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #e8e8e8;
  font-size: 13px;
  color: #111;
}

#shell-header {
  background: #1e4b8f;
  color: white;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}
#shell-header h1 { font-size: 15px; font-weight: 600; }
#shell-header .sub { font-size: 11px; opacity: 0.75; margin-top: 2px; font-family: monospace; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn-hdr {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 5px 14px; border-radius: 3px; font-size: 12px;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.btn-hdr:hover { background: rgba(255,255,255,0.28); }
.btn-hdr.print { background: #2e6fd4; border-color: #4a89e8; }
.btn-hdr.print:hover { background: #3a7fe0; }

#upload-wrap { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
.upload-zone {
  border: 2px dashed #c0bdb8; border-radius: 8px; background: #ffffff;
  padding: 52px 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  position: relative;
}
.upload-zone.drag { border-color: #1e4b8f; background: #f0f5ff; }
.upload-zone:hover { border-color: #1e4b8f; }
.upload-icon { font-size: 40px; margin-bottom: 12px; }
.upload-zone h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
.upload-zone p { color: #666; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
.btn-upload {
  display: inline-block; background: #1e4b8f; color: white; border: none;
  padding: 10px 28px; border-radius: 4px; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.btn-upload:hover { background: #163b74; }
#file-input { display: none; }

#error-box {
  background: #fff0f0; border: 1px solid #e04040; color: #b00;
  padding: 10px 16px; border-radius: 4px; margin: 16px 24px;
  font-size: 13px; display: none;
}

#results {
  display: none;
  padding: 20px 24px;
  max-width: 1100px;
  margin: 0 auto;
}

.info-strip {
  background: white; border: 1px solid #ccc; border-radius: 4px;
  padding: 10px 16px; margin-bottom: 16px; display: flex; gap: 24px;
  align-items: center; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.info-item { display: flex; flex-direction: column; }
.info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #777; }
.info-value { font-size: 13px; font-weight: 600; color: #1e4b8f; font-family: monospace; }
.info-div { width: 1px; height: 32px; background: #ddd; }

/* ── Minitab page ── */
.minitab-page {
  background: white; border: 1px solid #ccc; border-radius: 4px;
  margin-bottom: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); overflow: hidden;
}
.minitab-title {
  text-align: center; padding: 10px 16px 6px; border-bottom: 1px solid #e0e0e0;
}
.minitab-title .main { font-size: 15px; font-weight: 700; color: #111; }
.minitab-title .sub  { font-size: 12px; color: #555; margin-top: 1px; }

.minitab-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  max-width: 100%;
}
.chart-wrap {
  max-width: 500px;
  width: 100%;
}
.q-tl { border-right: 1px solid #ddd; padding: 10px 14px; }
.q-tr { padding: 10px 16px; }
.q-operator { border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; padding: 12px 16px; background: #fafafa; }

.q-label    { font-size: 11px; font-weight: 700; color: #222; margin-bottom: 1px; }
.q-sublabel { font-size: 10px; color: #666; margin-bottom: 6px; font-style: italic; }

canvas { display: block; }
.chart-note {
  font-size: 11px; color: #555; line-height: 1.45; margin-top: 10px; padding: 8px 0 0;
  border-top: 1px solid #e0e0e0; max-width: 500px;
}

/* Connector heatmap */
.connector-heatmap-wrap {
  margin-top: 24px; padding: 20px;
  background: linear-gradient(145deg, #f8f9fc 0%, #eef1f8 100%);
  border-radius: 12px;
  border: 1px solid rgba(30,75,143,0.12);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
}
.connector-heatmap-title {
  font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #1a1a2e;
  letter-spacing: 0.02em;
}
.connector-heatmap-container { width: 100%; min-height: 160px; position: relative; }
.pin-1-overlay {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 5;
  width: 22px;
  height: 22px;
  background: #fff;
  border: 2px solid #1e4b8f;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 800;
  color: #1e4b8f;
  text-align: center;
  line-height: 22px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.connector-heatmap {
  display: grid;
  gap: 2px;
  width: 100%;
  min-height: 140px;
  background: rgba(0,0,0,0.04);
  padding: 8px;
  border-radius: 10px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}
.connector-heatmap-cell {
  background: #fff;
  border-radius: 4px;
  min-height: 24px;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  position: relative;
}
.connector-heatmap-cell:hover { transform: scale(1.02); box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 1; }
.connector-heatmap-cell.pin-1 {
  box-shadow: 0 0 0 2px #1e4b8f;
}
.connector-heatmap-legend {
  display: flex; align-items: center; gap: 16px; margin-top: 14px; font-size: 12px; color: #333;
  flex-wrap: wrap;
}
.connector-heatmap-legend span { display: flex; align-items: center; gap: 6px; }
.connector-heatmap-legend .swatch {
  width: 18px; height: 14px; border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.connector-heatmap-legend .legend-caption { font-weight: 700; color: #1a1a2e; margin-right: 4px; }
.connector-heatmap-legend .legend-gradient-wrap { display: flex; align-items: center; }
.connector-heatmap-legend .legend-gradient {
  width: 80px; height: 14px; border-radius: 4px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
}
.connector-heatmap-legend .legend-low { background: hsl(0, 85%, 45%) !important; }
.connector-heatmap-legend .legend-mid { background: hsl(60, 85%, 45%) !important; }
.connector-heatmap-legend .legend-high { background: hsl(120, 85%, 45%) !important; }
.connector-heatmap-legend .legend-empty { background: #fff !important; border: 1px solid #bbb !important; }
.connector-heatmap-legend .legend-divider { display: inline-block; width: 1px; height: 14px; background: #ccc; margin: 0 4px; }
.pin-1-label { font-size: 10px; color: #1e4b8f; font-weight: 700; margin-top: 6px; }

/* right-side stats */
.stats-section { margin-bottom: 10px; }
.stats-section-title {
  font-size: 12px; font-weight: 700; text-align: center;
  border-bottom: 1px solid #aaa; padding-bottom: 3px; margin-bottom: 5px; color: #111;
}
.stats-req-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.stats-req-table th {
  text-align: center; color: #333; font-weight: 600;
  border-bottom: 1px solid #aaa; padding: 2px 6px; font-size: 11px;
}
.stats-req-table td { text-align: center; padding: 3px 6px; font-size: 12px; }
.stats-row-item { display: flex; justify-content: space-between; padding: 1.5px 0; font-size: 12px; }
.stats-row-item .lbl { color: #333; }
.stats-row-item .val { font-weight: 600; color: #111; }
.val.good     { color: #167a3a !important; }
.val.marginal { color: #9a6500 !important; }
.val.bad      { color: #c02020 !important; }
.stats-indent { padding-left: 14px; }
.stats-section-sub { font-size: 11px; font-weight: 600; color: #333; margin: 5px 0 3px; }

/* print-only staple message (in blue header) */
.print-staple-msg { display: none; }
@media print {
  .print-staple-msg {
    display: block !important;
    width: 100%;
    margin-top: 6px;
    padding: 8px 12px;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    background: #f7e033 !important;
    color: #1a1a1a;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }
}

/* print timestamp */
#print-timestamp { display: none; font-size: 11px; color: #555; text-align: right; font-style: italic; margin-bottom: 4px; }
@media print {
  #print-timestamp { display: block !important; }
}

/* operator msg */
.operator-msg {
  border: 1px solid #aaa; border-radius: 3px; padding: 10px 12px; font-size: 12px; line-height: 1.5;
}
.operator-msg.ok   { background: #f0faf3; border-color: #5cb87a; }
.operator-msg.warn { background: #fffbf0; border-color: #e0a020; }
.operator-msg.fail { background: #fff3f3; border-color: #d04040; }
.msg-head { font-size: 13px; font-weight: 700; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
.operator-msg.ok   .msg-head { color: #167a3a; }
.operator-msg.warn .msg-head { color: #9a6500; }
.operator-msg.fail .msg-head { color: #c02020; }

@media print {
  body { background: white; font-size: 11px; }
  /* Compact header block (blue area) so heatmap fits on one page */
  #shell-header {
    position: static !important; background: #1e4b8f !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    padding: 3px 10px !important;
    flex-wrap: wrap;
  }
  #shell-header h1 { font-size: 11px !important; line-height: 1.2 !important; }
  #shell-header .sub { font-size: 9px !important; opacity: 0.9; margin-top: 0 !important; }
  #shell-header .header-actions { display: none !important; }
  #shell-header .print-staple-msg { display: block !important; }
  #print-timestamp {
    font-size: 8px !important;
    margin-bottom: 2px !important;
    padding: 0 10px !important;
  }
  #upload-wrap  { display: none !important; }
  #results { padding: 4px 10px 8px !important; }
  .info-strip {
    box-shadow: none;
    padding: 4px 10px !important;
    margin-bottom: 4px !important;
    gap: 16px !important;
    flex-wrap: nowrap;
  }
  .info-strip .info-item { flex-direction: row !important; gap: 4px !important; align-items: baseline; }
  .info-strip .info-label { font-size: 8px !important; margin-bottom: 0 !important; }
  .info-strip .info-value { font-size: 9px !important; }
  .info-strip .info-div { display: none !important; }
  .minitab-page { page-break-after: always; break-after: page; box-shadow: none; margin-bottom: 0; border: 1px solid #999; }
  .minitab-page:last-child { page-break-after: avoid; break-after: avoid; }
  .minitab-title { padding: 3px 10px 2px !important; border-bottom-width: 1px; }
  .minitab-title .main { font-size: 11px !important; }
  .minitab-title .sub { font-size: 9px !important; }
  /* Stop/Go message: much bigger and more prominent on print */
  .q-operator { padding: 10px 12px !important; }
  .operator-msg {
    padding: 12px 16px !important;
    font-size: 13px !important;
    line-height: 1.35 !important;
    border-width: 2px !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .operator-msg .msg-head {
    font-size: 22px !important;
    font-weight: 800 !important;
    margin-bottom: 6px !important;
    letter-spacing: 0.02em !important;
    line-height: 1.2 !important;
  }
  .operator-msg.fail .msg-head { color: #b01010 !important; }
  .operator-msg.ok .msg-head { color: #0d6b0d !important; }
  .minitab-body { gap: 0; }
  .q-tl, .q-tr { padding: 5px 10px !important; }
  .q-label { font-size: 10px !important; }
  .q-sublabel { font-size: 9px !important; }
  .chart-note { font-size: 8px !important; margin-top: 3px !important; padding-top: 3px !important; }
  .connector-heatmap-wrap { margin-top: 6px !important; padding: 8px !important; }
  .connector-heatmap-title { font-size: 11px !important; margin-bottom: 6px !important; }
  .connector-heatmap-container { min-height: 80px !important; }
  .connector-heatmap { min-height: 80px !important; padding: 4px !important; gap: 1px !important; }
  .connector-heatmap-cell { min-height: 16px !important; }
  .connector-heatmap-legend { margin-top: 6px !important; font-size: 9px !important; gap: 10px !important; }
  .operator-msg.ok   { background: #f0faf3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .operator-msg.warn { background: #fffbf0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .operator-msg.fail { background: #fff3f3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  /* Heatmap: force backgrounds to print and avoid breaking across pages */
  .connector-heatmap-wrap {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    break-inside: avoid;
    page-break-inside: avoid;
    background: #f0f2f6 !important;
    box-shadow: none !important;
    border: 1px solid #ccc !important;
  }
  .connector-heatmap {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    min-height: 100px !important;
  }
  .connector-heatmap-cell {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    box-shadow: none !important;
    transform: none !important;
  }
  .pin-1-overlay {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    background: #fff !important;
    color: #1e4b8f !important;
    border: 2px solid #1e4b8f !important;
  }
  .connector-heatmap-legend .swatch { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .connector-heatmap-legend .legend-gradient { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>

<div id="shell-header">
  <div>
    <h1>Capability Analyzer</h1>
    <div class="sub" id="hdr-part">Load a measurement file to begin</div>
  </div>
  <div id="print-staple-msg" class="print-staple-msg" aria-hidden="true">Please staple this sheet to the back of the shop.</div>
  <div class="header-actions" id="hdr-actions" style="display:none">
    <button class="btn-hdr print" onclick="printReport()">🖨️ Print Report</button>
    <button class="btn-hdr" onclick="resetApp()">✕ New File</button>
  </div>
</div>

<div id="error-box"></div>

<div id="upload-wrap">
  <div class="upload-zone" id="dropzone">
    <input type="file" id="file-input" accept=".txt,.csv,.dat">
    <div class="upload-icon">📂</div>
    <h2>Drop your measurement file here</h2>
    <p>Supports Vertex production data format (.txt)<br>Drag &amp; drop or click below to browse</p>
    <button class="btn-upload" onclick="document.getElementById('file-input').click(); event.stopPropagation();">Browse File</button>
  </div>
</div>

<div id="print-timestamp"></div>
<div id="results"></div>

<script>
// ═══════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════
function mean(d){ return d.reduce((a,b)=>a+b,0)/d.length; }

function stdDev(d){
  if(d.length<2) return 0;
  const m=mean(d);
  return Math.sqrt(d.reduce((s,x)=>s+(x-m)**2,0)/(d.length-1));
}

function normalCDF(z){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=z<0?-1:1; z=Math.abs(z);
  const t=1/(1+p*z);
  const y=1-(((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t)*Math.exp(-z*z);
  return 0.5*(1+sign*y);
}
function normalPDF(x,m,s){ return Math.exp(-0.5*((x-m)/s)**2)/(s*Math.sqrt(2*Math.PI)); }

function normalPPF(p){
  if(p<=0) return -6; if(p>=1) return 6;
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const pl=0.02425,ph=1-pl;
  if(p<pl){ const q=Math.sqrt(-2*Math.log(p)); return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/(((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1)); }
  if(p<=ph){ const q=p-0.5,r=q*q; return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
  const q=Math.sqrt(-2*Math.log(1-p)); return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/(((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1));
}

function histogram(data,bins){
  const mn=Math.min(...data),mx=Math.max(...data);
  const w=(mx-mn||1e-9)/bins;
  const counts=new Array(bins).fill(0);
  const edges=Array.from({length:bins+1},(_,i)=>mn+i*w);
  data.forEach(x=>{ let i=Math.floor((x-mn)/w); if(i>=bins)i=bins-1; counts[i]++; });
  return {counts,edges,binWidth:w};
}

function andersonDarling(data){
  if(!data||data.length<3) return {stat:'N/A',pVal:'N/A',passed:null};
  const n=data.length, m=mean(data), s=stdDev(data);
  if(s===0) return {stat:'N/A',pVal:'N/A',passed:null};
  const sorted=[...data].sort((a,b)=>a-b);
  let S=0;
  for(let i=0;i<n;i++){
    const F=normalCDF((sorted[i]-m)/s);
    const F2=normalCDF((sorted[n-1-i]-m)/s);
    S+=(2*(i+1)-1)*(Math.log(Math.max(F,1e-15))+Math.log(Math.max(1-F2,1e-15)));
  }
  let A2=(-n-S/n)*(1+4/n-25/(n*n));
  let pVal;
  if(A2>=0.6)       pVal=Math.exp(1.2937-5.709*A2+0.0186*A2*A2);
  else if(A2>=0.34) pVal=Math.exp(0.9177-4.279*A2-1.38*A2*A2);
  else if(A2>=0.2)  pVal=1-Math.exp(-8.318+42.796*A2-59.938*A2*A2);
  else              pVal=1-Math.exp(-13.436+101.14*A2-223.73*A2*A2);
  pVal=Math.max(0.001,Math.min(0.999,pVal));
  return {
    stat: A2.toFixed(4),
    pVal: pVal<0.005?'<0.005':pVal.toFixed(3),
    passed: pVal>0.05
  };
}

function calcCapability(data,lsl,usl){
  if(!data||data.length<2) return null;
  const m=mean(data),s=stdDev(data);
  if(s<=0) return null;
  const hasLsl=lsl!==null, hasUsl=usl!==null;
  const ppl=hasLsl?(m-lsl)/(3*s):null;
  const pp=hasLsl&&hasUsl?(usl-lsl)/(6*s):null;
  const ppu=hasUsl?(usl-m)/(3*s):null;
  const ppk=hasLsl&&hasUsl?Math.min(ppu,ppl):null;
  const outBelowLsl=hasLsl?data.filter(x=>x<lsl).length:0;
  const pB=hasLsl?normalCDF((lsl-m)/s):0, pA=hasUsl?1-normalCDF((usl-m)/s):0;
  return {
    pp, ppk, ppu, ppl,
    ppkLsl: ppl,
    zBench: ppl!==null?3*ppl:null,
    pctObs:(outBelowLsl/data.length)*100, ppmObs:Math.round((outBelowLsl/data.length)*1e6),
    pctExp:(pB*100), ppmExp:Math.round(pB*1e6),
    mean:m, std:s
  };
}

function meanOffTarget(data,target){
  const n=data.length; if(n<2||target===null) return {off:false,p:'N/A'};
  const m=mean(data),s=stdDev(data),se=s/Math.sqrt(n);
  if(se===0) return {off:false,p:'1.000'};
  const t=Math.abs((m-target)/se);
  const p=2*(1-normalCDF(t));
  return {off:p<0.05, p:p<0.001?'<0.001':p.toFixed(3)};
}

// ═══════════════════════════════════════════════
//  PARSER
// ═══════════════════════════════════════════════
function parseVertex(content){
  const lines=content.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return null;
  if(lines[0].split('\t')[0].replace(/"/g,'').trim()!==':BEGIN') return null;
  let unit='mm',partDisplay=null,partPattern=null,dataStart=1;
  for(let i=1;i<Math.min(lines.length,10);i++){
    const raw=lines[i].trim();
    const UP=raw.toUpperCase();
    if(UP.includes('PATTERN:')){ partPattern=raw.split(/PATTERN:/i)[1].replace(/"/g,'').trim(); dataStart=i+1; continue; }
    if(UP.includes('DISPLAY:')){ partDisplay=raw.split(/DISPLAY:/i)[1].replace(/"/g,'').trim(); dataStart=i+1; continue; }
    if(UP.includes('UNIT:')){ unit=raw.split(/UNIT:/i)[1].replace(/"/g,'').trim(); dataStart=i+1; continue; }
    const ff=raw.split('\t')[0].replace(/"/g,'').trim();
    if(ff&&!ff.includes(':')){ dataStart=i; break; }
  }
  const segs=(partPattern||'').split('-');
  const numPositions=Math.max(1,parseInt(segs[1],10)||100);
  const numRows=Math.max(1,parseInt(segs[4],10)||4);
  const heatmapGrid=Array.from({length:numRows},()=>Array(numPositions).fill(null));
  let heatmapLsl=null, heatmapUsl=null;

  const map={};
  for(let i=dataStart;i<lines.length;i++){
    const parts=lines[i].split('\t').map(p=>p.replace(/"/g,'').trim());
    if(parts.length<5) continue;
    const crit=parts[0];
    if(!crit||crit===':END'||crit.startsWith(':')) continue;
    const meas=parseFloat(parts[1]),nom=parseFloat(parts[2]),upD=parseFloat(parts[3]),loD=parseFloat(parts[4]);
    if(isNaN(meas)) continue;
    const gk=crit.match(/^([A-Z]+\d+)/)?.[1]||crit;
    if(!map[gk]) map[gk]={name:gk,data:[],lsl:null,usl:null,target:null,subFeatures:[]};
    map[gk].data.push(meas);
    if(!map[gk].subFeatures.includes(crit)) map[gk].subFeatures.push(crit);
    if(!isNaN(nom)&&!isNaN(upD)&&!isNaN(loD)){
      if(map[gk].usl===null) map[gk].usl=r4(nom+upD);
      if(map[gk].lsl===null) map[gk].lsl=r4(nom+loD);
      if(map[gk].target===null) map[gk].target=r4(nom);
      if(heatmapLsl===null){ heatmapLsl=r4(nom+loD); heatmapUsl=r4(nom+upD); }
    }
    const rm=crit.match(/R(\d+)_(\d+)$/i);
    if(rm){
      const rowIdx=parseInt(rm[1],10)-1, sampleIdx=parseInt(rm[2],10);
      const posIdx=Math.min((sampleIdx-1)*5,numPositions-1);
      if(rowIdx>=0&&rowIdx<numRows) heatmapGrid[rowIdx][posIdx]=meas;
    }
  }
  const points=Object.values(map).filter(p=>p.data.length>0);
  return {points,unit,partDisplay,partPattern,heatmapGrid,heatmapRows:numRows,heatmapPositions:numPositions,heatmapLsl,heatmapUsl};
}

function r4(v){ return Math.round(v*10000)/10000; }
function heatmapColor(value,lsl,usl){
  if(value==null||lsl==null||usl==null) return null;
  const range=usl-lsl;
  if(range<=0) return 'hsl(0,0%,60%)';
  let t=(value-lsl)/range;
  t=Math.max(0,Math.min(1,t));
  const hue=120*t;
  return `hsl(${hue}, 85%, 45%)`;
}
function fN(v,dec=4){
  if(v===null||v===undefined||isNaN(v)) return 'N/A';
  return (Math.round(v*Math.pow(10,dec))/Math.pow(10,dec)).toFixed(dec).replace(/(\.\d*[1-9])0+$/,'$1').replace(/\.0+$/,'');
}
function fmtPpk(v){
  if(v===null||isNaN(v)) return {txt:'—',cls:''};
  const n=Math.round(v*100)/100;
  return {txt:n.toFixed(2), cls:n>=1.0?'good':n>=0.67?'marginal':'bad'};
}

// ═══════════════════════════════════════════════
//  DRAW HISTOGRAM  (Minitab style)
// ═══════════════════════════════════════════════
function drawHistogram(canvas,point){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const data=point.data,{lsl,usl,target}=point;
  const m=mean(data),s=stdDev(data);
  if(data.length<2||s===0){ ctx.fillStyle='#888';ctx.font='12px Arial';ctx.fillText('Insufficient data',10,H/2);return; }

  // x domain
  const specSpan=(usl!==null&&lsl!==null)?(usl-lsl):s*8;
  const pad=Math.max(specSpan*0.18,s*1.0);
  const xMin=Math.min(lsl??m-4*s,m-3.8*s)-pad;
  const xMax=Math.max(usl??m+4*s,m+3.8*s)+pad;
  const xRange=xMax-xMin;

  const bins=Math.max(6,Math.min(20,Math.round(Math.sqrt(data.length)*1.8)));
  const {counts,edges}=histogram(data,bins);
  const bwData=edges[1]-edges[0];
  const normalScale=data.length*bwData;
  const peakN=normalPDF(m,m,s)*normalScale;
  const yMax=Math.max(Math.max(...counts),peakN)*1.25;

  const pl=44,pr=10,pt=24,pb=46;
  const pw=W-pl-pr,ph=H-pt-pb;
  const tx=v=>pl+(v-xMin)/xRange*pw;
  const ty=v=>pt+ph-(v/yMax)*ph;

  // bg
  ctx.fillStyle='#fff';ctx.fillRect(pl,pt,pw,ph);

  // horizontal grid
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.8;
  for(let i=0;i<=4;i++){ const y=pt+(i/4)*ph; ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+pw,y);ctx.stroke(); }

  // bars
  counts.forEach((cnt,i)=>{
    if(!cnt) return;
    const x1=tx(edges[i]),x2=tx(edges[i+1]);
    const bw=Math.max(x2-x1-0.8,0.5),bh=(cnt/yMax)*ph,by=ty(cnt);
    ctx.fillStyle='#5b9bd5';ctx.fillRect(x1,by,bw,bh);
    ctx.strokeStyle='#3a7db5';ctx.lineWidth=0.7;ctx.strokeRect(x1,by,bw,bh);
  });

  // spec lines — LSL red (actionable), USL grey (reference only)
  function specLine(xv,label,lineColor){
    if(xv===null) return;
    const col=lineColor||'#cc0000';
    const x=tx(xv);
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=1.3;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(x,pt-4);ctx.lineTo(x,pt+ph);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=col;ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText(label,x,pt-7);
    ctx.restore();
  }
  specLine(lsl,'LSL');
  specLine(usl,'USL','#888');

  // target — green dashed
  if(target!==null){
    const x=tx(target);
    ctx.save();
    ctx.strokeStyle='#2a8a2a';ctx.lineWidth=1.1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(x,pt-4);ctx.lineTo(x,pt+ph);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#2a8a2a';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('Target',x,pt-7);
    ctx.restore();
  }

  // normal curve — dark red
  ctx.save();ctx.strokeStyle='#c82020';ctx.lineWidth=2;
  ctx.beginPath();
  for(let px=0;px<=pw;px++){
    const xv=xMin+(px/pw)*xRange;
    const cy=ty(normalPDF(xv,m,s)*normalScale);
    if(px===0) ctx.moveTo(pl+px,cy); else ctx.lineTo(pl+px,cy);
  }
  ctx.stroke();ctx.restore();

  // axes
  ctx.strokeStyle='#777';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pl,pt);ctx.lineTo(pl,pt+ph);ctx.lineTo(pl+pw,pt+ph);ctx.stroke();

  // x ticks & labels
  ctx.fillStyle='#333';ctx.font='9.5px Arial';ctx.textAlign='center';
  const nxt=6;
  for(let i=0;i<=nxt;i++){
    const v=xMin+(i/nxt)*xRange,x=tx(v);
    ctx.beginPath();ctx.moveTo(x,pt+ph);ctx.lineTo(x,pt+ph+3);ctx.stroke();
    ctx.fillText(fN(v,4),x,pt+ph+14);
  }
  // y ticks
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const v=Math.round((yMax/4)*i),y=ty(v);
    ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl-3,y);ctx.stroke();
    ctx.fillText(v,pl-5,y+3.5);
  }
}

// ═══════════════════════════════════════════════
//  DRAW Q-Q PLOT
// ═══════════════════════════════════════════════
function drawQQ(canvas,data){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const n=data.length;
  if(n<3){ ctx.fillStyle='#888';ctx.font='10px Arial';ctx.fillText('Need ≥3',10,H/2);return; }
  const sorted=[...data].sort((a,b)=>a-b);
  const m=mean(data),s=stdDev(data);
  const pts=sorted.map((v,i)=>({obs:v,theo:normalPPF((i+0.5)/n)}));
  const theoVals=pts.map(p=>p.theo);
  const obsVals=pts.map(p=>p.obs);
  const tMin=Math.min(...theoVals),tMax=Math.max(...theoVals);
  const oMin=Math.min(...obsVals),oMax=Math.max(...obsVals);
  const tR=tMax-tMin||1,oR=oMax-oMin||s||1;
  const tP=tR*0.12,oP=oR*0.12;
  const xMin=tMin-tP,xMax=tMax+tP,yMin=oMin-oP,yMax=oMax+oP;
  const pl=38,pr=6,pt=8,pb=28;
  const pw=W-pl-pr,ph=H-pt-pb;
  const tx=v=>pl+(v-xMin)/(xMax-xMin)*pw;
  const ty=v=>pt+ph-(v-yMin)/(yMax-yMin)*ph;

  ctx.fillStyle='#fff';ctx.fillRect(pl,pt,pw,ph);
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.8;
  for(let i=0;i<=4;i++){
    const y=pt+(i/4)*ph; ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+pw,y);ctx.stroke();
    const x=pl+(i/4)*pw; ctx.beginPath();ctx.moveTo(x,pt);ctx.lineTo(x,pt+ph);ctx.stroke();
  }
  // reference line
  ctx.strokeStyle='#c82020';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(tx(tMin),ty(m+tMin*s));
  ctx.lineTo(tx(tMax),ty(m+tMax*s));
  ctx.stroke();
  // dots
  ctx.fillStyle='#1e4b8f';
  pts.forEach(({obs,theo})=>{
    const cx=tx(theo),cy=ty(obs);
    if(cx<pl-2||cx>pl+pw+2||cy<pt-2||cy>pt+ph+2) return;
    ctx.beginPath();ctx.arc(cx,cy,2.2,0,Math.PI*2);ctx.fill();
  });
  // axes
  ctx.strokeStyle='#777';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pl,pt);ctx.lineTo(pl,pt+ph);ctx.lineTo(pl+pw,pt+ph);ctx.stroke();
  // x labels
  ctx.fillStyle='#333';ctx.font='8.5px Arial';ctx.textAlign='center';
  for(let i=0;i<=4;i++){
    const v=xMin+(i/4)*(xMax-xMin),x=tx(v);
    ctx.fillText(v.toFixed(1),x,pt+ph+10);
  }
  // y labels
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const v=yMin+(i/4)*(yMax-yMin),y=ty(v);
    ctx.fillText(fN(v,4),pl-3,y+3);
  }
  // axis label
  ctx.fillStyle='#555';ctx.font='8px Arial';ctx.textAlign='center';
  ctx.fillText('Theoretical Quantile',pl+pw/2,pt+ph+22);
  ctx.save();ctx.translate(9,pt+ph/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('Observed Value',0,0);ctx.restore();
}

// ═══════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════
function getStatus(ppk){
  if(ppk===null||isNaN(ppk)) return {level:'warn',icon:'⚠️',head:'Assessment Unavailable',body:'No lower specification limit found for this critical. Verify inputs and spec limits before running.'};
  if(ppk>=1.0) return {level:'ok',icon:'✅',head:'CONTINUE RUNNING',body:'(Ppk ≥ 1.0). Pin press is acceptable. No machine adjustment required. Continue running.'};
  return {level:'fail',icon:'🔴',head:'STOP — CALL A TECHNICIAN',body:'(Ppk < 1.0). Pins are pressed too far into the body. Stop production. Call a tech to adjust the press before continuing.'};
}

// ═══════════════════════════════════════════════
//  BUILD MINITAB PAGE
// ═══════════════════════════════════════════════
function buildPage(point, partDisplay, heatmap){
  const {data,lsl,usl,target,name}=point;
  const n=data.length, m=mean(data), s=stdDev(data);
  const cap=lsl!==null?calcCapability(data,lsl,usl):null;
  const mot=meanOffTarget(data,target);
  const ppkLsl=cap?cap.ppkLsl:null;
  const status=getStatus(ppkLsl);
  const ppkF=fmtPpk(ppkLsl);
  const ppF =fmtPpk(cap?cap.pp:null);

  const page=document.createElement('div');
  page.className='minitab-page';

  // title
  const td=document.createElement('div'); td.className='minitab-title';
  td.innerHTML=`<div class="main">Capability Snapshot for ${name}</div>
    <div class="sub">${partDisplay?'Part: '+partDisplay+' &nbsp;·&nbsp; ':''}Summary Report</div>`;
  page.appendChild(td);

  // ── Operator action banner (full-width, above chart/stats) ──
  const qop=document.createElement('div'); qop.className='q-operator';
  qop.innerHTML=`
    <div style="display:flex;gap:16px;align-items:center">
      <div style="flex:1">
        <div class="operator-msg ${status.level}">
          <div class="msg-head">${status.icon} ${status.head}</div>
          ${status.body}
        </div>
      </div>

    </div>
  `;
  page.appendChild(qop);

  const body=document.createElement('div'); body.className='minitab-body';

  // ── TL: Histogram ──
  const qtl=document.createElement('div'); qtl.className='q-tl';
  qtl.innerHTML='<div class="q-label">Histogram</div><div class="q-sublabel">Are the data inside the limits and close to the target?</div>';
  const chartWrap=document.createElement('div'); chartWrap.className='chart-wrap';
  const hc=document.createElement('canvas'); hc.width=500; hc.height=220;
  hc.style.cssText='max-width:100%;height:auto;display:block;';
  chartWrap.appendChild(hc);
  const chartNote=document.createElement('p');
  chartNote.className='chart-note';
  chartNote.innerHTML='Capability is assessed using a <strong>one-sided Ppk vs. LSL only</strong>. Being near the lower spec is bad; exceeding the upper spec is acceptable while we hold our pins as close to the pcb as possible.';
  chartWrap.appendChild(chartNote);
  qtl.appendChild(chartWrap);
  body.appendChild(qtl);

  // ── TR: Stats panel ──
  const qtr=document.createElement('div'); qtr.className='q-tr';
  function row(lbl,val,cls='',indent=false){
    return `<div class="stats-row-item${indent?' stats-indent':''}"><span class="lbl">${lbl}</span><span class="val ${cls}">${val}</span></div>`;
  }
  qtr.innerHTML=`
    <div class="stats-section">
      <div class="stats-section-title">Customer Requirements</div>
      <table class="stats-req-table">
        <thead><tr><th>Lower Spec</th><th>Target</th><th>Upper Spec</th></tr></thead>
        <tbody><tr>
          <td>${lsl!==null?fN(lsl,5):'—'}</td>
          <td>${target!==null?fN(target,5):'—'}</td>
          <td>${usl!==null?fN(usl,5):'—'}</td>
        </tr></tbody>
      </table>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Process Characterization</div>
      ${row('Total N', n)}
      ${row('Mean', fN(m,7))}
      ${row('Mean off target', mot.off?'<span class="bad">Yes</span>':'No','',true)}
      ${row('P-value', mot.p,'',true)}
      ${row('Standard deviation', fN(s,7))}
      <div class="stats-section-sub">Capability statistics (one-sided vs LSL)</div>
      ${row('Pp',       cap?ppF.txt:'—',  ppF.cls, true)}
      ${row('Ppk (vs LSL)', cap?ppkF.txt:'—', ppkF.cls,true)}
      ${row('Z.Bench',  cap&&cap.zBench!=null?fN(cap.zBench,2):'—','',true)}
      ${row('% Out of spec (observed)', cap?fN(cap.pctObs,2):'—','',true)}
      ${row('% Out of spec (expected)', cap?fN(cap.pctExp,2):'—','',true)}
      ${row('PPM (DPMO) (observed)',  cap?cap.ppmObs:'—','',true)}
      ${row('PPM (DPMO) (expected)',  cap?cap.ppmExp:'—','',true)}
    </div>
  `;
  body.appendChild(qtr);
  page.appendChild(body);

  if(heatmap&&heatmap.grid&&heatmap.rows&&heatmap.positions&&heatmap.lsl!=null&&heatmap.usl!=null){
    const wrap=document.createElement('div'); wrap.className='connector-heatmap-wrap';
    const title=document.createElement('div'); title.className='connector-heatmap-title'; title.textContent='Pin press by position (connector layout)';
    wrap.appendChild(title);
    const container=document.createElement('div'); container.className='connector-heatmap-container';
    const gridEl=document.createElement('div');
    gridEl.className='connector-heatmap';
    gridEl.style.gridTemplateRows=`repeat(${heatmap.rows}, minmax(28px, 1fr))`;
    gridEl.style.gridTemplateColumns=`repeat(${heatmap.positions}, minmax(0, 1fr))`;
    const pin1DataIndex=4;
    const pin1Col=Math.min((pin1DataIndex-1)*5,heatmap.positions-1);
    for(let r=0;r<heatmap.rows;r++)
      for(let c=0;c<heatmap.positions;c++){
        const cell=document.createElement('div');
        cell.className='connector-heatmap-cell'+(r===0&&c===pin1Col?' pin-1':'');
        const v=heatmap.grid[r][c];
        const color=heatmapColor(v,heatmap.lsl,heatmap.usl);
        if(color){ cell.style.background=color; cell.title=v!=null?`Row ${r+1} pos ${c+1}: ${v}`:''; }
        gridEl.appendChild(cell);
      }
    container.appendChild(gridEl);
    const pin1Overlay=document.createElement('div');
    pin1Overlay.className='pin-1-overlay';
    pin1Overlay.setAttribute('aria-label','Pin 1');
    pin1Overlay.textContent='1';
    container.appendChild(pin1Overlay);
    const pin1Label=document.createElement('div'); pin1Label.className='pin-1-label';
    pin1Label.innerHTML='<strong>Pin 1</strong> = first position (top-left cell)';
    container.appendChild(pin1Label);
    wrap.appendChild(container);
    const legend=document.createElement('div'); legend.className='connector-heatmap-legend';
    legend.innerHTML=`
      <span class="legend-caption">Scale:</span>
      <span class="legend-gradient-wrap">
        <span class="legend-gradient" style="background:linear-gradient(to right, hsl(0,85%,45%), hsl(60,85%,45%), hsl(120,85%,45%))"></span>
      </span>
      <span><span class="swatch legend-low" title="Low / At risk"></span> Low (at risk) — LSL ${fN(heatmap.lsl,4)}</span>
      <span><span class="swatch legend-mid" title="Mid"></span> Mid</span>
      <span><span class="swatch legend-high" title="High / Good"></span> High (good) — USL ${fN(heatmap.usl,4)}</span>
      <span class="legend-divider"></span>
      <span><span class="swatch legend-empty"></span> Not measured</span>`;
    wrap.appendChild(legend);
    page.appendChild(wrap);
  }

  setTimeout(()=>{ drawHistogram(hc,point); },0);
  return page;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderResults(parsed,filename){
  const {points,partDisplay,partPattern}=parsed;
  const div=document.getElementById('results'); div.innerHTML='';
  const part=partPattern||partDisplay||'—';

  const strip=document.createElement('div'); strip.className='info-strip';
  strip.innerHTML=`
    <div class="info-item"><span class="info-label">Part Number</span><span class="info-value">${part}</span></div>
    <div class="info-div"></div>
    <div class="info-item"><span class="info-label">File</span><span class="info-value" style="font-size:11px;color:#444">${filename}</span></div>
    <div class="info-div"></div>
    <div class="info-item info-note"><span class="info-label">Note</span><span class="info-value">Please staple this chart to the back of the shop.</span></div>
  `;
  div.appendChild(strip);
  const heatmap=parsed.heatmapGrid&&parsed.heatmapLsl!=null&&parsed.heatmapUsl!=null?{
    grid:parsed.heatmapGrid,rows:parsed.heatmapRows,positions:parsed.heatmapPositions,
    lsl:parsed.heatmapLsl,usl:parsed.heatmapUsl
  }:null;
  points.forEach(p=>div.appendChild(buildPage(p,part,heatmap)));
  div.style.display='block';
  document.getElementById('upload-wrap').style.display='none';
  document.getElementById('hdr-actions').style.display='flex';
  document.getElementById('hdr-part').textContent=part;
}

// ═══════════════════════════════════════════════
//  APP WIRING
// ═══════════════════════════════════════════════
function printReport(){
  const now=new Date();
  const ts=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
    +' at '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('print-timestamp').textContent='Printed: '+ts;
  window.print();
}
function showError(msg){
  const b=document.getElementById('error-box'); b.textContent='⚠️ '+msg; b.style.display='block';
}
function resetApp(){
  document.getElementById('results').style.display='none';
  document.getElementById('results').innerHTML='';
  document.getElementById('upload-wrap').style.display='block';
  document.getElementById('hdr-actions').style.display='none';
  document.getElementById('hdr-part').textContent='Load a measurement file to begin';
  document.getElementById('error-box').style.display='none';
  document.getElementById('file-input').value='';
}
function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('error-box').style.display='none';
    try{
      const parsed=parseVertex(e.target.result);
      if(!parsed||!parsed.points||!parsed.points.length){
        showError('Could not find measurement data. Verify the file is in Vertex :BEGIN/:END format.'); return;
      }
      renderResults(parsed,file.name);
    }catch(err){ showError('Parse error: '+err.message); }
  };
  reader.readAsText(file);
}
const dz=document.getElementById('dropzone');
const fi=document.getElementById('file-input');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processFile(f);});
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f)processFile(f);});
</script>
